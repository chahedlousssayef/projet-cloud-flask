---
- name: Install git
  apt:
    name: git
    state: present
    update_cache: true

- name: Check if app_home is a git repo
  stat:
    path: "{{ app_home }}/.git"
  register: git_dir

- name: Clean app_home if not a git repo
  file:
    path: "{{ app_home }}"
    state: absent
  when: not git_dir.stat.exists

- name: Clone or update repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_home }}"
    version: "{{ repo_branch }}"
    force: true
  become_user: "{{ ansible_user }}"

- name: Generate .env file for production
  template:
    src: env.j2
    dest: "{{ app_home }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Deploy with Docker Compose
  command: docker compose --env-file .env -f infra/docker/compose.prod.yml up -d --build
  args:
    chdir: "{{ app_home }}"
  become_user: "{{ ansible_user }}"
  register: compose_result

- name: Ensure deploy script is executable
  file:
    path: "{{ app_home }}/deploy.sh"
    mode: "0755"

- name: Wait for backend to be healthy
  uri:
    url: "http://localhost:5000/health"
    method: GET
    status_code: 200
  register: health_result
  retries: 12
  delay: 5
  until: health_result.status == 200

- name: Wait for frontend to be ready
  uri:
    url: "http://localhost:80"
    method: GET
    status_code: 200
  register: frontend_result
  retries: 6
  delay: 5
  until: frontend_result.status == 200
