---
- name: Install git
  apt:
    name: git
    state: present
    update_cache: true

- name: Clone or update repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_home }}"
    version: "{{ repo_branch }}"
    force: true
  become_user: "{{ ansible_user }}"

- name: Generate .env file for production
  template:
    src: env.j2
    dest: "{{ app_home }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Deploy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_home }}/infra/docker"
    project_name: flask
    compose_files:
      - compose.prod.yml
    state: present
    build: always
  become_user: "{{ ansible_user }}"
  environment:
    DOCKER_HOST: unix:///var/run/docker.sock
  register: compose_result

- name: Ensure deploy script is executable
  file:
    path: "{{ app_home }}/deploy.sh"
    mode: "0755"

- name: Wait for backend to be healthy
  uri:
    url: "http://localhost:5000/health"
    method: GET
    status_code: 200
  register: health_result
  retries: 12
  delay: 5
  until: health_result.status == 200

- name: Wait for frontend to be ready
  uri:
    url: "http://localhost:80"
    method: GET
    status_code: 200
  register: frontend_result
  retries: 6
  delay: 5
  until: frontend_result.status == 200
