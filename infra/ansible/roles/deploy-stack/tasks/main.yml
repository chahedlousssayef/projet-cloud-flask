---
- name: Copy SSH key for Git from control node
  copy:
    content: "{{ lookup('file', ssh_private_key_path) }}"
    dest: "{{ app_home }}/.ssh/id_rsa"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when: ssh_private_key_path is defined
  no_log: true

- name: Clone or update repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_home }}"
    version: "{{ repo_branch }}"
    force: true
    key_file: "{{ app_home }}/.ssh/id_rsa"
  become_user: "{{ ansible_user }}"
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"

- name: Generate .env file for production
  template:
    src: env.j2
    dest: "{{ app_home }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Deploy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_home }}/infra/docker"
    project_name: flask
    compose_files:
      - compose.prod.yml
    state: present
    build: always
  become_user: "{{ ansible_user }}"
  environment:
    DOCKER_HOST: unix:///var/run/docker.sock
  register: compose_result

- name: Ensure deploy script is executable
  file:
    path: "{{ app_home }}/deploy.sh"
    mode: "0755"
